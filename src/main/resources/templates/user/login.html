<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>로그인</title>
    <link rel="stylesheet" href="/user/styles/login.css">
    <script defer src="/user/scripts/login.js"></script>
</head>
<body>
<!-- 네비게이션 바 -->
<header class="nav">
    <nav class="inner">
        <div class="logo">
            <img src="/assets/images/logo.png" alt="도담도담 로고">
        </div>
        <ul class="menu">
            <li class="item"><a href="#">검색</a></li>
            <li class="item"><a href="#">새로 들어온 책</a></li>
            <li class="item"><a href="#">베스트셀러</a></li>
            <li class="item"><a href="#">희망 도서 신청</a></li>
        </ul>
        <div class="auth">
            <a href="#" class="nav-login">login</a>
        </div>
    </nav>
</header>

<main class="main">
    <div class="login-box">
        <h1 class="login-title">LOGIN</h1>

        <form class="login-form" name="loginForm" method="post">
            <div class="form-field">
                <label class="form-label">
                    <span class="form-caption">ID</span>
                    <input class="form-input" type="text" id="userId" name="userId">
                </label>
                <label class="form-field">
                    <span class="form-caption">PASSWORD</span>
                    <input class="form-input" type="password" id="password" name="password">
                </label>

                <button class="btn btn-label" type="submit">로그인</button>
                <button class="btn btn-register" type="button" onclick="location.href='/register'">회원가입</button>
                <div class="login-links">
                    <a href="#" class="login-link">아이디 찾기</a>
                    <span class="login-link-divider">|</span>
                    <a href="#" class="login-link">비밀번호 찾기</a>
                </div>
            </div>
        </form>
    </div>
</main>
<footer class="footer">
    <div class="footer-inner">
        <div class="footer-logo">
            <img src="/assets/images/logo.png" alt="도담도담 로고">
        </div>
        <div class="footer-info">
            <p class="footer-name">도담도담 도서관</p>
            <p class="footer-detail">서울특별시 어딘가 | 대표전화 02-000-0000</p>
            <p class="footer-copy">© 2026 도담도담. All rights reserved.</p>
        </div>
    </div>
</footer>
</body>
</html>
