<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>내 정보 수정 - 도담도담</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/user/styles/mypage/mypage-edit.css">
    <script defer src="/user/scripts/mypage-edit.js"></script>
    <!-- 다음 주소 API -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>

<header th:replace="~{fragment/common :: nav}"></header>

<main class="edit-main">
    <div class="edit-container">
        <div class="edit-inner">

            <!-- 헤더 -->
            <div class="edit-header">
                <a href="/mypage" class="edit-back">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    마이페이지로
                </a>
                <h1 class="edit-title">내 정보 수정</h1>
                <p class="edit-sub">이름, 연락처, 주소, 비밀번호를 변경할 수 있어요.</p>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="edit-card">
                <div class="edit-card-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    기본 정보
                </div>

                <div class="edit-readonly-row">
                    <span class="edit-readonly-label">아이디</span>
                    <span class="edit-readonly-value" th:text="${user.userId}">-</span>
                </div>
                <div class="edit-readonly-row">
                    <span class="edit-readonly-label">이메일</span>
                    <span class="edit-readonly-value" th:text="${user.email}">-</span>
                </div>

                <div class="edit-form-row">
                    <div class="edit-form-group">
                        <label class="edit-label" for="name">이름</label>
                        <input type="text" class="edit-input" id="name"
                               th:value="${user.name}" maxlength="5" placeholder="이름" />
                    </div>
                    <div class="edit-form-group">
                        <label class="edit-label">휴대폰 번호</label>
                        <div class="edit-mobile-row">
                            <input type="text" class="edit-input edit-input-mobile" id="mobileFirst"
                                   th:value="${user.mobileFirst}" maxlength="3" placeholder="010" />
                            <span class="edit-mobile-dash">-</span>
                            <input type="text" class="edit-input edit-input-mobile" id="mobileSecond"
                                   th:value="${user.mobileSecond}" maxlength="4" placeholder="0000" />
                            <span class="edit-mobile-dash">-</span>
                            <input type="text" class="edit-input edit-input-mobile" id="mobileThird"
                                   th:value="${user.mobileThird}" maxlength="4" placeholder="0000" />
                        </div>
                    </div>
                </div>

                <div class="edit-form-group">
                    <label class="edit-label" for="addressPrimary">주소</label>
                    <div class="edit-address-row">
                        <input type="text" class="edit-input" id="addressPrimary"
                               th:value="${user.addressPrimary}" placeholder="기본 주소" readonly />
                        <button type="button" class="btn-address" id="btnAddressSearch">주소 찾기</button>
                    </div>
                    <input type="text" class="edit-input edit-input-secondary" id="addressSecondary"
                           th:value="${user.addressSecondary}" placeholder="상세 주소" />
                </div>

                <div class="edit-form-bottom">
                    <button type="button" class="btn-save" id="btnSaveProfile">저장</button>
                </div>

                <div class="edit-msg" id="profileMsg"></div>
            </div>

            <!-- 비밀번호 변경 카드 -->
            <div class="edit-card">
                <div class="edit-card-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    비밀번호 변경
                </div>

                <div class="edit-form-row" style="grid-template-columns: 1fr;">
                    <div class="edit-form-group">
                        <label class="edit-label" for="currentPassword">현재 비밀번호</label>
                        <input type="password" class="edit-input" id="currentPassword" placeholder="현재 비밀번호 입력" />
                    </div>
                </div>

                <div class="edit-form-row">
                    <div class="edit-form-group">
                        <label class="edit-label" for="newPassword">새 비밀번호</label>
                        <input type="password" class="edit-input" id="newPassword" placeholder="새 비밀번호 입력" />
                    </div>
                    <div class="edit-form-group">
                        <label class="edit-label" for="confirmPassword">새 비밀번호 확인</label>
                        <input type="password" class="edit-input" id="confirmPassword" placeholder="새 비밀번호 재입력" />
                    </div>
                </div>

                <div class="edit-form-bottom">
                    <button type="button" class="btn-save" id="btnSavePassword">변경</button>
                </div>

                <div class="edit-msg" id="passwordMsg"></div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragment/common :: footer}"></footer>
</body>
</html>
