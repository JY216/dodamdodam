<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>마이페이지 - 도담도담</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/user/styles/mypage/mypage.css">
    <script defer src="/assets/scripts/common.js"></script>
</head>
<body>

<header th:replace="~{fragment/common :: nav}"></header>

<main class="mypage-main">
    <div class="mypage-container">

        <!-- 헤더 -->
        <div class="mypage-header">
            <h1 class="mypage-title">
                <span class="mypage-username" th:text="${userName}">이용자</span>
                님의 도담 페이지
            </h1>
            <p class="mypage-desc">
                <span th:text="${userName}">이용자</span>
                님, 안녕하세요!
            </p>
        </div>

        <!-- 카드 그리드 -->
        <div class="mypage-grid">

            <!-- 도서 대출 현황 -->
            <a th:href="@{/mypage/loans}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">도서 대출 현황</p>
                    <p class="mypage-card-count" th:text="${loanCount}">0</p>
                </div>
            </a>

            <!-- 도서 예약 현황 -->
            <a th:href="@{/mypage/reservations}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">도서 예약 현황</p>
                    <p class="mypage-card-count" th:text="${pendingCount}">0</p>
                </div>
            </a>

            <!-- 나의 관심 도서 -->
            <a th:href="@{/mypage/likes}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">나의 관심 도서</p>
                    <p class="mypage-card-count" th:text="${likeCount}">0</p>
                </div>
            </a>

            <!-- 희망 도서 신청 현황 -->
            <a th:href="@{/mypage/wish-books}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">희망 도서 신청 현황</p>
                    <p class="mypage-card-count" th:text="${wishCount}">0</p>
                </div>
            </a>

            <!-- 프로그램 신청 현황 -->
            <a th:href="@{/mypage/events}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">프로그램 신청 현황</p>
                    <p class="mypage-card-count" th:text="${eventCount}">0</p>
                </div>
            </a>

            <!-- 나의 정보 수정 -->
            <a th:href="@{/mypage/edit}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">나의 정보 수정</p>
                    <p class="mypage-card-count">→</p>
                </div>
            </a>

            <!-- 일지 쓰기 -->
            <a th:href="@{/journal}" class="mypage-card">
                <div class="mypage-card-icon">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">독서 일지</p>
                    <p class="mypage-card-count">→</p>
                </div>
            </a>

            <!-- 관리자 페이지 (관리자만 표시) -->
            <a th:href="@{/admin/dashboard}" class="mypage-card" sec:authorize="hasRole('ADMIN')">
                <div class="mypage-card-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="mypage-card-body">
                    <p class="mypage-card-label">관리자 페이지</p>
                    <p class="mypage-card-count">→</p>
                </div>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragment/common :: footer}"></footer>

</body>
</html>
