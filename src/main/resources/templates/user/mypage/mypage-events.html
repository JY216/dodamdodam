<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>프로그램 신청 현황 - 도담도담</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/user/styles/mypage/mypage-events.css">
</head>
<body>

<header th:replace="~{fragment/common :: nav}"></header>

<main class="events-main">
    <div class="events-container">

        <!-- 헤더 -->
        <div class="events-header">
            <h1 class="events-title">
                <span class="events-username" th:text="${userName}">이용자</span>
                님의 프로그램 신청 현황
            </h1>
            <p class="events-desc">신청한 문화 행사 및 프로그램 목록이에요.</p>
        </div>

        <!-- 신청 목록 -->
        <div class="events-list" th:if="${not #lists.isEmpty(applications)}">
            <div class="event-item" th:each="app : ${applications}">

                <!-- 상태 뱃지 -->
                <div class="event-item-badge">
                    <span class="event-status-badge"
                          th:classappend="${app.eventStatus == 'CLOSED'} ? ' event-status-badge--closed' :
                                          (${app.eventStatus == 'CANCELLED'} ? ' event-status-badge--cancelled' : '')"
                          th:text="${app.eventStatus == 'OPEN'} ? '신청중' :
                                   (${app.eventStatus == 'CLOSED'} ? '마감' : '취소')">
                    </span>
                </div>

                <!-- 행사 정보 -->
                <div class="event-item-info">
                    <h3 class="event-item-title" th:text="${app.eventTitle}"></h3>
                    <p class="event-item-meta">
                        <span class="event-item-meta-label">교육 일정</span>
                        <span th:text="${#temporals.format(app.eventStartAt, 'yyyy-MM-dd HH:mm')}
                                      + ' ~ ' +
                                      ${#temporals.format(app.eventEndAt, 'yyyy-MM-dd HH:mm')}">
                        </span>
                    </p>
                    <p class="event-item-meta">
                        <span class="event-item-meta-label">신청일</span>
                        <span th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd')}"></span>
                    </p>
                </div>

                <!-- 취소 버튼 -->
                <div class="event-item-action">
                    <form th:if="${app.eventStatus == 'OPEN'}"
                          th:action="@{/events/{id}/cancel(id=${app.eventId})}" method="post">
                        <input type="hidden" name="redirect" value="/mypage/events">
                        <button type="submit" class="btn-cancel-event"
                                onclick="return confirm('신청을 취소하시겠어요?')">
                            신청 취소
                        </button>
                    </form>
                    <span th:if="${app.eventStatus != 'OPEN'}" class="text-muted">-</span>
                </div>

            </div>
        </div>

        <!-- 신청 내역 없음 -->
        <div class="events-empty" th:if="${#lists.isEmpty(applications)}">
            <p>신청한 프로그램이 없어요.</p>
            <a href="/" class="btn-go-home">문화 행사 보러 가기</a>
        </div>

    </div>
</main>

<footer th:replace="~{fragment/common :: footer}"></footer>
</body>
</html>
