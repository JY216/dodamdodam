<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>도담도담</title>
    <link rel="stylesheet" href="/assets/styles/home.css">
    <link rel="stylesheet" href="/ai/assets/styles/chatbot.css">
    <script defer src="/assets/scripts/home.js"></script>
</head>
<body>
<!--chatbot-floating-->
<div th:replace="~{fragment/common :: .fab}"></div>

<!-- 네비게이션 바 -->
<header th:replace="~{fragment/common :: nav}"></header>

<main class="main">
    <!-- 배너 -->
    <section class="banner">
        <div class="banner-slider" id="bannerSlider">
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200&q=80" alt="도서관 전경 1">
            </div>
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1200&q=80" alt="도서관 전경 2">
            </div>
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200&q=80" alt="도서관 전경 3">
            </div>
        </div>
    </section>
    <!--    빌린 도서 D-Day-->
    <section class="loan-banner" sec:authorize="isAuthenticated()">
        <div class="loan-slider" id="loanSlider">
            <!-- 빌린 책 없을 때 -->
            <div class="loan-slide active" th:if="${activeLoans == null or #lists.isEmpty(activeLoans)}">
                <span class="loan-title">빌린 도서가 없습니다.</span>
                <a href="/mypage/loans" class="loan-diary">+ 독서 일지 쓰기</a>
            </div>
            <!-- 빌린 책 있을 때 -->
            <div class="loan-slide" th:each="loan : ${activeLoans}">
            <span class="loan-title">
                <span th:text="'「' + ${loan.bookTitle} + '」 반납 예정일 : ' + (${loan.dday} >= 0 ? 'D - ' + ${loan.dday} : 'D + ' + (-${loan.dday}))"></span>
            </span>
                <a href="/mypage/loans" class="loan-diary">+ 독서 일지 쓰기</a>
            </div>
        </div>
    </section>

    <section class="cards">
        <div class="card card-left">

        </div>
        <div class="card card-right">

        </div>
    </section>

    <section class="programs">
        <div class="programs-header">
            <h2 class="programs-title">문화 행사</h2>
        </div>

        <div class="programs-slider-wrapper">
            <button class="programs-btn programs-btn--prev" type="button" aria-label="이전">&lt;</button>
            <div class="programs-slider" id="programsSlider">

                <div class="programs-track" id="programsTrack">
                    <!-- DB에서 불러온 행사 -->
                    <div class="program-card" th:each="event : ${events}">
                        <a th:href="@{/events/{id}(id=${event.id})}" class="program-card-link">
                            <div class="program-card-inner">
                    <span class="program-badge"
                          th:classappend="${event.status == 'CLOSED'} ? ' program-badge--closed' : ''"
                          th:text="${event.status == 'OPEN'} ? '신청중' :
                                   (${event.status == 'CLOSED'} ? '마감' : '취소')">
                    </span>
                                <h3 class="program-name" th:text="${event.title}"></h3>
                                <dl class="program-info">
                                    <div class="program-info-row">
                                        <dt>대상</dt>
                                        <dd th:text="${event.target}"></dd>
                                    </div>
                                    <div class="program-info-row">
                                        <dt>교육</dt>
                                        <dd th:text="${#temporals.format(event.eventStartAt, 'yyyy-MM-dd HH:mm')}
                                        + ' ~ ' +
                                        ${#temporals.format(event.eventEndAt, 'yyyy-MM-dd HH:mm')}">
                                        </dd>
                                    </div>
                                    <div class="program-info-row">
                                        <dt>접수</dt>
                                        <dd th:text="${#temporals.format(event.applyStartAt, 'yyyy-MM-dd HH:mm')}
                                        + ' ~ ' +
                                        ${#temporals.format(event.applyEndAt, 'yyyy-MM-dd HH:mm')}">
                                        </dd>
                                    </div>
                                    <div class="program-info-row">
                                        <dt>신청</dt>
                                        <dd th:text="'신청 : ' + ${event.applicationCount} + '/' + ${event.capacity}"></dd>
                                    </div>
                                </dl>
                            </div>
                        </a>
                    </div>

                    <!-- 행사 없을 때 -->
                    <div class="program-card" th:if="${#lists.isEmpty(events)}">
                        <div class="program-card-inner">
                            <p style="color: #888; text-align: center; padding: 2rem 0;">등록된 문화 행사가 없어요.</p>
                        </div>
                    </div>
                </div>

            </div>
            <button class="programs-btn programs-btn--next" type="button" aria-label="다음">&gt;</button>
        </div>
    </section>
</main>
<!--footer-->
<footer th:replace="~{fragment/common :: footer}"></footer>
</body>
</html>
