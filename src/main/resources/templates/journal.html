<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>독서 일지</title>
    <link rel="stylesheet" href="/assets/styles/fragments.css">
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/journal/assets/styles/journal.css">
    <script defer src="/assets/scripts/common.js"></script>
    <script defer src="/journal/assets/scripts/journal.js"></script>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
</head>
<body>
<div th:replace="~{fragment/common :: dialog}"></div>
<div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">내 독서 일지</span>
            <span class="sidebar-count" id="journalCount">0</span>
        </div>
        <div class="sidebar-search">
            <label for="searchInput" class="sr-only">일지 검색</label>
            <input type="text" id="searchInput" placeholder="일지 검색..."/>
        </div>
        <div class="sidebar-list" id="journalList">
            <div class="sidebar-empty">
                아직 작성된 일지가 없어요.<br>첫 번째 독서 일지를 남겨보세요!
            </div>
        </div>
    </aside>

    <!-- 사이드바 토글 탭 -->
    <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="사이드바 열기/닫기">
        <svg width="10" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
    </button>

    <!-- 메인 -->
    <main class="main" id="mainContent">
        <div class="main-inner">

            <h1 class="page-title">독서 일지</h1>
            <p class="page-sub">읽은 책의 감상과 기록을 남겨보세요.</p>

            <!-- 독서 목표 카드 -->
            <div class="goal-card">
                <div class="goal-card-top">
                    <span class="goal-label">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                        올해 독서 목표
                    </span>
                    <button class="goal-edit-btn" id="goalEditBtn" type="button">목표 수정</button>
                </div>

                <div id="goalDisplay">
                    <div class="goal-numbers">
                        <span class="goal-current" id="goalCurrent">3</span>
                        <span class="goal-sep">/</span>
                        <span class="goal-total" id="goalTotal">12</span>
                        <span class="goal-unit">권</span>
                    </div>
                    <div class="goal-bar-wrap">
                        <div class="goal-bar" id="goalBar" style="width: 25%"
                             role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                    <div class="goal-bar-info">
                        <span id="goalPercent">25% 달성</span>
                        <span id="goalRemain">9권 남음</span>
                    </div>
                </div>

                <div class="goal-edit-area" id="goalEditArea">
                    <label for="goalInput" class="goal-edit-label">목표 권수</label>
                    <input type="number" id="goalInput" min="1" max="365" value="12"/>
                    <button class="goal-save-btn" type="button">저장</button>
                </div>
            </div>

            <!-- 일지 작성 폼 -->
            <div class="write-card" id="writeCard">
                <div class="write-card-title">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    새 독서 일지 작성
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="journalTitle">일지 제목 <span class="required" aria-hidden="true">*</span></label>
                        <input type="text" class="form-input" id="journalTitle" placeholder="일지 제목을 입력하세요" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="journalDate">독서 날짜 <span class="required" aria-hidden="true">*</span></label>
                        <input type="date" class="form-input" id="journalDate" required/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="bookTitle">책 제목 <span class="required" aria-hidden="true">*</span></label>
                        <input type="text" class="form-input" id="bookTitle" placeholder="읽은 책 제목" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="bookAuthor">저자</label>
                        <input type="text" class="form-input" id="bookAuthor" placeholder="저자명"/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <span class="form-label" id="starLabel">별점</span>
                        <div class="star-group" id="starGroup" role="group" aria-labelledby="starLabel">
                            <button class="star-btn" type="button" data-val="1" aria-label="별점 1점">★</button>
                            <button class="star-btn" type="button" data-val="2" aria-label="별점 2점">★</button>
                            <button class="star-btn" type="button" data-val="3" aria-label="별점 3점">★</button>
                            <button class="star-btn" type="button" data-val="4" aria-label="별점 4점">★</button>
                            <button class="star-btn" type="button" data-val="5" aria-label="별점 5점">★</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="readStatus">독서 상태</label>
                        <select class="form-select" id="readStatus">
                            <option value="reading">📖 읽는 중</option>
                            <option value="done" selected>✅ 완독</option>
                            <option value="pause">⏸ 잠시 멈춤</option>
                        </select>
                    </div>
                </div>

                <div class="form-group form-group--slider">
                    <label class="form-label" for="pageSlider">읽은 페이지</label>
                    <div class="page-slider-wrap">
                        <input type="range" class="page-slider" id="pageSlider" min="0" max="500" value="0"/>
                        <span class="page-slider-val" id="sliderVal" aria-live="polite">0 p</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="journalContent">독서 감상 <span class="required" aria-hidden="true">*</span></label>
                    <textarea class="form-textarea" id="journalContent" placeholder="오늘 읽은 내용과 감상을 자유롭게 기록해보세요..." required></textarea>
                </div>

                <div class="form-bottom">
                    <button class="btn-home" type="button">메인으로</button>
                    <button class="btn-cancel" type="button">초기화</button>
                    <button class="btn-submit" type="button">일지 저장</button>
                </div>
            </div>

            <!-- 일지 상세 뷰 -->
            <div class="detail-view" id="detailView">
                <div class="detail-top">
                    <div>
                        <div class="detail-journal-title" id="detailTitle"></div>
                        <div class="detail-meta">
                            <span id="detailDate"></span>
                            <span id="detailStatus"></span>
                        </div>
                    </div>
                    <div class="detail-actions">
                        <button class="detail-btn" type="button">새 일지</button>
                        <button class="detail-btn del" type="button">삭제</button>
                    </div>
                </div>
                <div class="detail-book-chip" id="detailBook"></div>
                <div class="detail-stars" id="detailStars"></div>
                <div class="detail-progress" id="detailProgress"></div>
                <div class="detail-content" id="detailContent"></div>
                <button class="detail-new-btn" type="button">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    새 독서 일지 작성
                </button>
            </div>

        </div>
    </main>
</div>
</body>
</html>
