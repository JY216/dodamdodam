<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>common</title>
</head>
<body>
<!-- 네비게이션 바 -->
<header class="nav" th:fragment="nav">
    <nav class="inner">
        <div class="logo">
            <a href="/">
                <img src="/assets/images/logo.png" alt="도담도담 로고">
            </a>
        </div>
        <ul class="menu">
            <li class="item"><a href="/search">도서 검색</a></li>
            <li class="item"><a href="/new-books">새로 들어온 책</a></li>
            <li class="item"><a href="/bestseller">베스트셀러</a></li>
            <li class="item"><a href="/wish-book">희망 도서 신청</a></li>
        </ul>
        <div class="auth">
            <a href="/login" class="nav-login" sec:authorize="isAnonymous()">login</a>
            <div class="auth-user" sec:authorize="isAuthenticated()">
                <a href="/mypage" class="nav-mypage">My page</a>
                <a href="/logout" class="nav-login">logout</a>
            </div>
        </div>
        <!-- 햄버거 버튼 -->
        <button class="nav-hamburger" id="navHamburger" type="button" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>
    <!-- 모바일 메뉴 -->
    <div class="nav-mobile-menu" id="navMobileMenu">
        <ul class="mobile-menu-list">
            <li><a href="/search">도서 검색</a></li>
            <li><a href="/new-books">새로 들어온 책</a></li>
            <li><a href="/bestseller">베스트셀러</a></li>
            <li><a href="/wish-book">희망 도서 신청</a></li>
        </ul>
        <div class="mobile-auth">
            <a href="/login" sec:authorize="isAnonymous()">로그인</a>
            <div sec:authorize="isAuthenticated()">
                <a href="/mypage">마이페이지</a>
                <a href="/logout">로그아웃</a>
            </div>
        </div>
    </div>
</header>

<!-- chatbot -->
<a class="fab" href="/ai/chatbot" aria-label="챗봇 열기">
    <svg viewBox="0 0 24 24">
        <path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/>
    </svg>
</a>

<!-- 공통 다이얼로그 -->
<div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog-box" id="dialogBox">
        <p class="dialog-message" id="dialogMessage"></p>
        <div class="dialog-actions" id="dialogActions"></div>
    </div>
</div>

<!-- 푸터 -->
<footer class="footer" th:fragment="footer">
    <div class="footer-inner">
        <div class="footer-logo">
            <img src="/assets/images/logo.png" alt="도담도담 로고">
        </div>
        <div class="footer-info">
            <p class="footer-name">도담도담 도서관</p>
            <p class="footer-detail">대구광역시 어딘가 | 대표전화 053-000-0000</p>
            <p class="footer-copy">© 2026 도담도담. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
</html>
