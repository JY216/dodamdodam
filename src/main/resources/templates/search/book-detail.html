<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title th:text="${book.title} + ' - 도담도담'">도서 상세 - 도담도담</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/search/styles/book-detail.css">
    <script src="/search/scripts/book-detail.js" defer></script>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
</head>
<body>

<header th:replace="~{fragment/common :: nav}"></header>

<main class="detail-main">
    <div class="detail-container">

        <!-- 상단 영역 -->
        <div class="detail-top">

            <!-- 표지 -->
            <div class="detail-cover-wrap">
                <img class="detail-cover"
                     th:src="${book.coverImage}"
                     th:alt="${book.title}"
                     onerror="this.src='/assets/images/no-cover.png'" />
            </div>

            <!-- 기본 정보 -->
            <div class="detail-info">
                <p class="detail-category" th:text="${book.categoryName}">카테고리</p>
                <h1 class="detail-title" th:text="${book.title}">책 제목</h1>
                <p class="detail-author-pub">
                    <span th:text="${book.author}">저자</span>
                    <span class="detail-divider">|</span>
                    <span th:text="${book.publisher}">출판사</span>
                    <span class="detail-divider">|</span>
                    <span th:text="${book.publishDate}">출판일</span>
                </p>

                <!-- 책 메타 정보 -->
                <div class="detail-meta-table">
                    <div class="detail-meta-row">
                        <span class="detail-meta-label">자료유형</span>
                        <span class="detail-meta-value">도서</span>
                    </div>
                    <div class="detail-meta-row" th:if="${!#strings.isEmpty(book.isbn)}">
                        <span class="detail-meta-label">ISBN</span>
                        <span class="detail-meta-value" th:text="${book.isbn}">-</span>
                    </div>
                    <div class="detail-meta-row" th:if="${!#strings.isEmpty(pages)}">
                        <span class="detail-meta-label">페이지</span>
                        <span class="detail-meta-value" th:text="${pages}">-</span>
                    </div>
                </div>

                <!-- 액션 버튼 -->
                <div class="detail-actions">
                    <!-- 비로그인 -->
                    <a th:if="${!isLoggedIn}" href="/login" class="btn-reserve">로그인 후 예약</a>

                    <!-- 로그인 -->
                    <th:block th:if="${isLoggedIn}">
                        <!-- 대출 가능 -->
                        <form th:if="${availableCopies > 0}" th:action="@{/reserve}" method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}" />
                            <input type="hidden" name="redirect" th:value="'/books/' + ${book.id}" />
                            <button type="submit" class="btn-reserve">예약하기</button>
                        </form>
                        <!-- 예약 가능 (대출 중이지만 예약 가능) -->
                        <!-- 예약 대기 -->
                        <form th:if="${canReserve}" th:action="@{/reserve}" method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}" />
                            <input type="hidden" name="redirect" th:value="'/books/' + ${book.id}" />
                            <button type="submit" class="btn-reserve btn-reserve--waiting">예약 대기</button>
                        </form>
                        <!-- 대출 불가 -->
                        <button th:if="${availableCopies == 0 and !canReserve}"
                                class="btn-reserve btn-reserve--disabled" disabled>대출 불가</button>

                        <!-- 좋아요 버튼 -->
                        <button class="btn-like js-like-btn"
                                th:classappend="${isLiked} ? 'active'"
                                th:data-id="${book.id}"
                                th:data-liked="${isLiked}">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                            <span th:text="${isLiked} ? '관심 해제' : '관심 도서'">관심 도서</span>
                        </button>
                    </th:block>
                </div>
            </div>
        </div>

        <!-- 소장 현황 -->
        <div class="detail-section detail-stock-section">
            <h2 class="detail-section-title">소장 현황</h2>
            <div class="detail-stock">
                <div class="stock-item">
                    <span class="stock-label">전체</span>
                    <span class="stock-value" th:text="${totalCopies} + '권'">0권</span>
                </div>
                <div class="stock-divider"></div>
                <div class="stock-item">
                    <span class="stock-label">대출 중</span>
                    <span class="stock-value" th:text="${loanedCopies} + '권'">0권</span>
                </div>
                <div class="stock-divider"></div>
                <div class="stock-item">
                    <span class="stock-label">대출 가능</span>
                    <span class="stock-value"
                          th:classappend="${availableCopies > 0} ? 'available' : 'unavailable'"
                          th:text="${availableCopies} + '권'">0권</span>
                </div>
            </div>
        </div>

        <!-- 책 소개 -->
        <div class="detail-section" th:if="${!#strings.isEmpty(description)}">
            <h2 class="detail-section-title">책 소개</h2>
            <p class="detail-description" th:text="${description}">책 소개가 없어요.</p>
        </div>

        <!-- 책 소개 없을 때 -->
        <div class="detail-section" th:if="${#strings.isEmpty(description)}">
            <h2 class="detail-section-title">책 소개</h2>
            <p class="detail-no-desc">책 소개 정보가 없어요.</p>
        </div>

    </div>
</main>

<footer th:replace="~{fragment/common :: footer}"></footer>
<script src="/assets/scripts/common.js"></script>
<script src="/search/scripts/book-detail.js"></script>
</body>
</html>
