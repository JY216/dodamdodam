<!DOCTYPE html>

<body>

    <!-- 로고 -->
    <div class="sidebar-logo">
        도담도담 <span class="sidebar-logo__accent">ADMIN</span>
    </div>

    <!-- ── Overview ── -->
    <div class="sidebar-section">
        <p class="sidebar-section__title">Overview</p>
        <ul class="sidebar-menu">
            <li>
                <a th:href="@{/admin/dashboard}"
                   th:classappend="${currentMenu == 'dashboard'} ? 'is-active'"
                   class="sidebar-menu__item">

                        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>

                        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>

            <li>
                <a th:href="@{/admin?menu=notice-register}"

                   class="sidebar-menu__item">
                    <svg class="sidebar-menu__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.1"/>
                        <line x1="8" y1="5" x2="8" y2="11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <span>공지 작성</span>
                </a>
            </li>
            <li>
                <a th:href="@{/admin?menu=notice-manage}"

                   class="sidebar-menu__item">
                    <svg class="sidebar-menu__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.1"/>

                        <line x1="5" y1="8.5" x2="11" y2="8.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

                    </svg>
                    <span>도서 목록 / 편집</span>
                </a>
            </li>
            <li>
                <a th:href="@{/admin?menu=wish-book-list}"
                   th:classappend="${currentMenu == 'wish-book-list'} ? 'is-active'"
                   class="sidebar-menu__item">
                    <svg class="sidebar-menu__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M2 2h12v12H2z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
                        <line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

                </a>

            <li>
                <a th:href="@{/admin?menu=book-register}"
                   th:classappend="${currentMenu == 'book-register'} ? 'is-active'"

            <li>
                <a th:href="@{/admin?menu=book-status}"

                   class="sidebar-menu__item">
                    <svg class="sidebar-menu__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/>
                        <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>도서 상태 관리</span>

                        <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
                        <path d="M2.5 13c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

        <ul class="sidebar-menu">
