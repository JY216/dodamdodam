<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="userListSection">

    <div class="page-wrapper">

        <!-- 헤더 -->
        <div class="page-header">
            <div>
                <h1>회원 목록 / 관리</h1>
                <p>등록된 전체 회원을 조회하고 관리할 수 있어요.</p>
            </div>
        </div>

        <!-- 검색 -->
        <form method="get" th:action="@{/admin/users}" class="search-bar">
            <input type="text"
                   name="name"
                   th:value="${name}"
                   placeholder="이름으로 검색" />
            <input type="text"
                   name="mobile"
                   th:value="${mobile}"
                   placeholder="전화번호로 검색" />
            <button type="submit" class="btn-search">검색</button>
        </form>

        <!-- data가 null이면 렌더링 skip (다른 메뉴 진입 시 파싱 에러 방지) -->
        <th:block th:if="${data != null}">

            <!-- 테이블 -->
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>번호</th>
                        <th>회원명</th>
                        <th>이메일</th>
                        <th>연락처</th>
                        <th>역할</th>
                        <th>상태</th>
                        <th>대출 수</th>
                        <th>가입일</th>
                        <th>편집</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!-- 빈 상태 -->
                    <tr class="empty-row" th:if="${#lists.isEmpty(data.members)}">
                        <td colspan="9">등록된 회원이 없습니다.</td>
                    </tr>

                    <!-- 목록 -->
                    <tr th:each="user, stat : ${data.members}">

                        <td th:text="${(data.currentPage - 1) * 10 + stat.count}">1</td>

                        <td>
                            <div class="user-cell">
                                <span th:text="${user.name}"></span>
                            </div>
                        </td>

                        <td th:text="${user.email}"></td>

                        <td th:text="${user.mobileFirst + '-' + user.mobileSecond + '-' + user.mobileThird}">010-0000-0000</td>

                        <td>
                            <span class="role"
                                  th:classappend="${user.role == 'ADMIN'} ? 'role-admin' : 'role-user'"
                                  th:text="${user.role == 'ADMIN'} ? '관리자' : '일반 회원'">
                                일반 회원
                            </span>
                        </td>

                        <td>
                            <span class="badge"
                             th:classappend="${user.status == 'NORMAL'} ? 'badge-active' : 'badge-suspend'" th:text="${user.status == 'NORMAL'} ? '정상' : '정지'">정상</span>
                        </td>

                        <td th:text="${user.loanCount}">0</td>

                        <td th:text="${user.createdAt}">2024-01-01</td>

                        <td>
                            <a th:href="@{/admin/users/{id}/delete(id=${user.userId})}"
                               class="btn-delete"
                               onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${data.totalPages > 1}">

                <a th:href="@{/admin/users(page=1, name=${name}, mobile=${mobile})}"
                   th:if="${data.currentPage > 1}">&lt;&lt;</a>

                <a th:href="@{/admin/users(page=${data.currentPage - 1}, name=${name}, mobile=${mobile})}"
                   th:if="${data.currentPage > 1}">&lt;</a>

                <th:block th:each="i : ${#numbers.sequence(1, data.totalPages)}">
                <span th:if="${i == data.currentPage}"
                      class="active"
                      th:text="${i}">1</span>
                    <a th:unless="${i == data.currentPage}"
                       th:href="@{/admin/users(page=${i}, name=${name}, mobile=${mobile})}"
                       th:text="${i}">1</a>
                </th:block>

                <a th:href="@{/admin/users(page=${data.currentPage + 1}, name=${name}, mobile=${mobile})}"
                   th:if="${data.currentPage < data.totalPages}">&gt;</a>

                <a th:href="@{/admin/users(page=${data.totalPages}, name=${name}, mobile=${mobile})}"
                   th:if="${data.currentPage < data.totalPages}">&gt;&gt;</a>

            </div>

        </th:block>

    </div>

</th:block>
</body>
</html>
