<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="bookStatusSection">

    <div class="admin-list">
        <div class="admin-list-header">
            <div>
                <h2 class="admin-list-title">도서 상태 관리</h2>
                <p class="admin-list-subtitle">도서별 대출 현황과 사본 상태를 관리할 수 있어요.</p>
            </div>
        </div>

        <!-- 검색 바 -->
        <form class="list-search" action="/admin" method="get">
            <input type="hidden" name="menu" value="book-status">
            <input type="text" name="statusKeyword"
                   placeholder="도서명, 저자로 검색"
                   th:value="${statusKeyword}">
            <button type="submit" class="btn-search-submit">검색</button>
        </form>

        <!-- 테이블 -->
        <div class="table-wrap">
            <table class="book-table status-table" >
                <thead>
                <tr>
                    <th>도서명</th>
                    <th>저자</th>
                    <th>전체 수량</th>
                    <th>대출 가능</th>
                    <th>상태</th>
                    <th>사본 관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td class="col-ellipsis" th:text="${book.title}"></td>
                    <td class="col-ellipsis" th:text="${book.author}"></td>
                    <td class="col-ellipsis" th:text="${book.totalQuantity}"></td>
                    <td>
                        <span class="col-ellipsis" th:text="${book.availableQuantity}"></span>
                        <span  th:text="'/' + ${book.totalQuantity}" class="text-muted col-ellipsis"></span>
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${book.availableQuantity > 0} ? 'status-badge--available' : 'status-badge--loaned'"
                              th:text="${book.availableQuantity > 0} ? '대출 가능' : '대출 불가'">
                        </span>
                    </td>
                    <td class="col-actions">
                        <button class="btn-edit" th:onclick="|location.href='/admin?menu=book-copies&id=${book.id}'|">사본 보기</button>
                        <form th:action="@{/admin/books/add-copy}" method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}">
                            <input type="hidden" name="totalQuantity" th:value="${book.totalQuantity}">
                            <button type="submit" class="btn-add-copy">+ 수량 추가</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="6" class="table-empty">등록된 도서가 없어요.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" th:if="${pageVo != null and pageVo.maxPage > 1}">
            <div class="page-group" th:if="${pageVo.requestPage > pageVo.minPage}">
                <a class="page-link" th:href="@{/admin(menu='book-status', page=${pageVo.minPage}, statusKeyword=${statusKeyword})}">&lt;&lt;</a>
                <a class="page-link" th:href="@{/admin(menu='book-status', page=${pageVo.requestPage - 1}, statusKeyword=${statusKeyword})}">&lt;</a>
            </div>
            <div class="page-group">
                <a th:each="p : ${#numbers.sequence(pageVo.startPage, pageVo.endPage)}"
                   th:text="${p}"
                   th:href="@{/admin(menu='book-status', page=${p}, statusKeyword=${statusKeyword})}"
                   th:class="${p == pageVo.requestPage} ? 'page-link page-link--active' : 'page-link'">
                </a>
            </div>
            <div class="page-group" th:if="${pageVo.requestPage < pageVo.maxPage}">
                <a class="page-link" th:href="@{/admin(menu='book-status', page=${pageVo.requestPage + 1}, statusKeyword=${statusKeyword})}">&gt;</a>
                <a class="page-link" th:href="@{/admin(menu='book-status', page=${pageVo.maxPage}, statusKeyword=${statusKeyword})}">&gt;&gt;</a>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
