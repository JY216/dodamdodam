<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="bookListSection">

    <div class="admin-list">
        <div class="admin-list-header">
            <div>
                <h2 class="admin-list-title">도서 목록 / 편집</h2>
                <p class="admin-list-subtitle">등록된 전체 도서를 조회하고 편집할 수 있어요.</p>
            </div>
            <a href="/admin?menu=book-register" class="btn-add">+ 도서 등록</a>
        </div>

        <!-- 검색 바 -->
        <div class="list-search">
            <input type="text" id="searchInput" placeholder="도서명, 저자, ISBN으로 검색">
        </div>

        <!-- 테이블 -->
        <div class="table-wrap">
            <table class="book-table">
                <thead>
                <tr>
                    <th>ISBN</th>
                    <th class="col-ellipsis">도서명</th>
                    <th>저자</th>
                    <th class="col-ellipsis">출판사</th>
                    <th>카테고리</th>
                    <th>수량</th>
                    <th>등록일</th>
                    <th>편집</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.isbn}"></td>
                    <td class="col-ellipsis" th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td class="col-ellipsis" th:text="${book.publisher}"></td>
                    <td th:text="${book.categoryName}"></td>
                    <td th:text="${book.totalQuantity}"></td>
                    <td th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <button class="btn-edit" th:onclick="|location.href='/admin?menu=book-edit&id=${book.id}'|">편집</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="8" class="table-empty">등록된 도서가 없어요.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" th:if="${pageVo != null and pageVo.maxPage > 1}">
            <div class="page-group" th:if="${pageVo.requestPage > pageVo.minPage}">
                <a class="page-link" th:href="@{/admin(menu='book-list', page=${pageVo.minPage})}">&lt;&lt;</a>
                <a class="page-link" th:href="@{/admin(menu='book-list', page=${pageVo.requestPage - 1})}">&lt;</a>
            </div>
            <div class="page-group">
                <a th:each="p : ${#numbers.sequence(pageVo.startPage, pageVo.endPage)}"
                   th:text="${p}"
                   th:href="@{/admin(menu='book-list', page=${p})}"
                   th:class="${p == pageVo.requestPage} ? 'page-link page-link--active' : 'page-link'">
                </a>
            </div>
            <div class="page-group" th:if="${pageVo.requestPage < pageVo.maxPage}">
                <a class="page-link" th:href="@{/admin(menu='book-list', page=${pageVo.requestPage + 1})}">&gt;</a>
                <a class="page-link" th:href="@{/admin(menu='book-list', page=${pageVo.maxPage})}">&gt;&gt;</a>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
