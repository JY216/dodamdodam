<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="dashboardSection">


    <div class="dashboard-wrapper">

        <!-- 헤더 -->
        <div class="dashboard-header">
            <div>
                <h1 class="dashboard-title">운영 현황 대시보드</h1>
                <p class="dashboard-sub">도담도담 도서관의 오늘을 한눈에 확인하세요.</p>
            </div>
            <div class="dashboard-date" id="dashboardDate"></div>
        </div>

        <!-- 메인 그리드 -->
        <div class="dashboard-grid">

            <!-- 회원 현황 -->
            <div class="dash-card card-wide card-users">
                <div class="card-header">
                    <div class="card-icon icon-users">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <span class="card-title">회원 현황</span>
                </div>
                <div class="card-stats">
                    <div class="stat-block">
                        <p class="stat-label">전체 회원</p>
                        <p class="stat-num" th:text="${totalUsers}">0</p>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-block stat-block-sub">
                        <p class="stat-label">오늘 가입</p>
                        <p class="stat-num" th:text="${todayUsers}">0</p>
                    </div>
                    <div class="stat-block stat-block-sub">
                        <p class="stat-label">이번 달 가입</p>
                        <p class="stat-num" th:text="${monthlyUsers}">0</p>
                    </div>
                    <div class="stat-block stat-block-sub stat-block-warn">
                        <p class="stat-label">정지 회원</p>
                        <p class="stat-num" th:text="${suspendedUsers}">0</p>
                    </div>
                </div>
            </div>

            <!-- 도서 현황 -->
            <div class="dash-card card-wide card-books">
                <div class="card-header">
                    <div class="card-icon icon-books">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                    </div>
                    <span class="card-title">도서 현황</span>
                </div>
                <div class="card-stats">
                    <div class="stat-block">
                        <p class="stat-label">전체 도서</p>
                        <p class="stat-num" th:text="${totalBooks}">0</p>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-block stat-block-sub">
                        <p class="stat-label">이번 달 신규</p>
                        <p class="stat-num" th:text="${newBooks}">0</p>
                    </div>
                </div>
            </div>

            <!-- 대출 중 -->
            <div class="dash-card card-small card-loans">
                <div class="small-header">
                    <div class="card-icon icon-loans">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 11 12 14 22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                    </div>
                    <span class="small-title">대출 중</span>
                </div>
                <div class="num-unit-wrap">
                    <p class="small-num" th:text="${activeLoans}">0</p>
                    <p class="small-unit">건</p>
                </div>
            </div>

            <!-- 진행 중인 행사 -->
            <div class="dash-card card-small card-events">
                <div class="small-header">
                    <div class="card-icon icon-events">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <span class="small-title">진행 중인 행사</span>
                </div>
                <div class="num-unit-wrap">
                    <p class="small-num" th:text="${activeEvents}">0</p>
                    <p class="small-unit">건</p>
                </div>
            </div>

        </div>

        <!-- 바로가기 -->
        <div class="shortcut-grid">
            <a th:href="@{/admin/books}" class="shortcut-card">
                <span class="shortcut-label">도서 목록 관리</span>
                <span class="shortcut-arrow">→</span>
            </a>
            <a th:href="@{/admin/users}" class="shortcut-card">
                <span class="shortcut-label">회원 목록 관리</span>
                <span class="shortcut-arrow">→</span>
            </a>
            <a th:href="@{/admin/users/status}" class="shortcut-card">
                <span class="shortcut-label">회원 상태 제어</span>
                <span class="shortcut-arrow">→</span>
            </a>
            <a th:href="@{/admin/circulation-process}" class="shortcut-card">
                <span class="shortcut-label">대출 / 반납 처리</span>
                <span class="shortcut-arrow">→</span>
            </a>
            <a th:href="@{/admin/event-manage}" class="shortcut-card">
                <span class="shortcut-label">행사 운영 관리</span>
                <span class="shortcut-arrow">→</span>
            </a>
            <a th:href="@{/admin/book-register}" class="shortcut-card">
                <span class="shortcut-label">신규 도서 등록</span>
                <span class="shortcut-arrow">→</span>
            </a>
        </div>

    </div>
    <script>
        const d = new Date();
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        document.getElementById('dashboardDate').textContent =
            d.getFullYear() + '년 ' +
            (d.getMonth() + 1) + '월 ' +
            d.getDate() + '일 (' + days[d.getDay()] + ')';
    </script>

</th:block>
</body>
</html>
